# ── Autonomous Website Testing Agent Configuration ──

target_url: "https://books.toscrape.com/"

# Additional pages to test (paths resolved against target_url, or full URLs)
extra_urls: []
  # - "/products"
  # - "/view_cart"
  # - "/login"

llm:
  planner:
    provider: "openrouter"      # openrouter | gemini | groq | ollama | nvidia | openai
    model: "openrouter/auto"    # Automatically choose a capable model per request
    api_key_env: "OPENROUTER_API_KEY"

  executor:
    provider: "openrouter"
    model: "openrouter/auto"    # Auto Router selects a tool-capable model
    api_key_env: "OPENROUTER_API_KEY"

  summarizer:
    provider: "openrouter"
    model: "openrouter/auto"
    api_key_env: "OPENROUTER_API_KEY"

  fallback:
    provider: "openrouter"
    model: "openrouter/auto"
    api_key_env: "OPENROUTER_API_KEY"

concurrency:
  max_executors: 1                  # Keep at 1 to avoid 502s from concurrent cloud model requests
  stagger_delay_seconds: 2.0        # Increased delay between executor launches
  step_timeout: 180                 # Per-agent step timeout in seconds
  max_steps: 15                     # Maximum browser-agent actions per test

depth:
  max_depth: 0                      # 0 = root only, 1-2 = follow sub-pages discovered by planner

approval:
  mode: "auto_approve"              # auto_approve | interrupt | auto_decline
  timeout_seconds: 120

report:
  output_path: "report.md"

browser:
  headless: true                   # false = see the browser (useful for debugging)
  proxy: null
  use_cloud: false

security:
  allow_private_targets: false     # Enable only for trusted local development targets
  allowed_target_domains: []       # Optional exact hosts or *.example.com patterns
